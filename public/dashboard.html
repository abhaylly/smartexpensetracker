<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Expense Tracker - Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dashboard-page">

  <header class="navbar">
    <div class="navbar-brand">
      <span class="logo-icon">&#9781;</span>
      <span>Smart Expense Tracker</span>
    </div>
    <div class="navbar-user">
      <span id="user-name">Loading...</span>
      <button class="btn btn-ghost" id="logout-btn">Logout</button>
    </div>
  </header>

  <main class="dashboard-main">

    <div class="summary-grid">
      <div class="summary-card income-card">
        <div class="card-label">Total Income</div>
        <div class="card-amount" id="total-income">&#8377;0.00</div>
      </div>
      <div class="summary-card expense-card">
        <div class="card-label">Total Expense</div>
        <div class="card-amount" id="total-expense">&#8377;0.00</div>
      </div>
      <div class="summary-card balance-card">
        <div class="card-label">Balance</div>
        <div class="card-amount" id="balance">&#8377;0.00</div>
      </div>
    </div>

    <div class="content-grid">

      <aside class="sidebar">
        <div class="card">
          <div class="card-header">
            <h2 id="form-title">Add Transaction</h2>
          </div>
          <form id="transaction-form">
            <input type="hidden" id="edit-id" value="" />

            <div class="form-group">
              <label>Type</label>
              <div class="radio-group">
                <label class="radio-label income-radio">
                  <input type="radio" name="type" value="income" checked />
                  <span>Income</span>
                </label>
                <label class="radio-label expense-radio">
                  <input type="radio" name="type" value="expense" />
                  <span>Expense</span>
                </label>
              </div>
            </div>

            <div class="form-group">
              <label for="amount">Amount (&#8377;)</label>
              <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required />
            </div>

            <div class="form-group">
              <label for="category">Category</label>
              <select id="category" required>
                <option value="">Select category</option>
                <optgroup label="Income">
                  <option value="Salary">Salary</option>
                  <option value="Freelance">Freelance</option>
                  <option value="Business">Business</option>
                  <option value="Investment">Investment</option>
                  <option value="Gift">Gift</option>
                  <option value="Other Income">Other Income</option>
                </optgroup>
                <optgroup label="Expense">
                  <option value="Food">Food</option>
                  <option value="Transport">Transport</option>
                  <option value="Shopping">Shopping</option>
                  <option value="Utilities">Utilities</option>
                  <option value="Healthcare">Healthcare</option>
                  <option value="Education">Education</option>
                  <option value="Entertainment">Entertainment</option>
                  <option value="Travel">Travel</option>
                  <option value="Rent">Rent</option>
                  <option value="Other Expense">Other Expense</option>
                </optgroup>
              </select>
            </div>

            <div class="form-group">
              <label for="date">Date</label>
              <input type="date" id="date" required />
            </div>

            <div class="form-group">
              <label for="description">Description <span class="optional">(optional)</span></label>
              <input type="text" id="description" placeholder="Brief note about this transaction" />
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
                Add Transaction
              </button>
              <button type="button" class="btn btn-ghost btn-full hidden" id="cancel-edit-btn">
                Cancel Edit
              </button>
            </div>
          </form>
        </div>
      </aside>

      <section class="main-content">
        <div class="card">
          <div class="card-header">
            <h2>Transactions</h2>
            <button class="btn btn-ghost btn-sm" id="reset-filters-btn">Clear Filters</button>
          </div>

          <div class="filter-bar">
            <div class="filter-group">
              <label>Type</label>
              <select id="filter-type">
                <option value="all">All Types</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
              </select>
            </div>
            <div class="filter-group">
              <label>Category</label>
              <select id="filter-category">
                <option value="all">All Categories</option>
                <option value="Salary">Salary</option>
                <option value="Freelance">Freelance</option>
                <option value="Business">Business</option>
                <option value="Investment">Investment</option>
                <option value="Gift">Gift</option>
                <option value="Other Income">Other Income</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Shopping">Shopping</option>
                <option value="Utilities">Utilities</option>
                <option value="Healthcare">Healthcare</option>
                <option value="Education">Education</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Travel">Travel</option>
                <option value="Rent">Rent</option>
                <option value="Other Expense">Other Expense</option>
              </select>
            </div>
            <div class="filter-group">
              <label>From Date</label>
              <input type="date" id="filter-start" />
            </div>
            <div class="filter-group">
              <label>To Date</label>
              <input type="date" id="filter-end" />
            </div>
            <button class="btn btn-primary btn-sm" id="apply-filters-btn">Apply</button>
          </div>

          <div class="table-wrapper">
            <table id="transactions-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Type</th>
                  <th>Category</th>
                  <th>Description</th>
                  <th>Amount</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="transactions-body">
                <tr>
                  <td colspan="6" class="empty-state">Loading transactions...</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div id="table-footer" class="table-footer hidden">
            <span id="row-count"></span>
          </div>
        </div>
      </section>

    </div>
  </main>

  <div id="toast-container"></div>

  <script src="js/app.js"></script>
</body>
</html>
